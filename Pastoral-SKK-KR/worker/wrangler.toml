name = "pas-presensi-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Set secrets via: npx wrangler secret put <NAME>
# Required secrets:
#   TIDB_DATABASE_URL  — mysql://user:pass@host:4000/db?sslaccept=strict
#   JWT_SECRET         — random string for signing JWT tokens
#   CORS_ORIGIN        — your GitHub Pages URL (e.g. https://thengb.github.io)
#
# Optional (for Kalender Pastoral Google Sheets access):
#   GAPI_KEY           — Google API key with Sheets API enabled
#   GSA_JSON           — Google Service Account JSON (for OAuth2, used if GAPI_KEY not set/doesn't work)
#
# Example:
#   npx wrangler secret put TIDB_DATABASE_URL
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put CORS_ORIGIN
#   npx wrangler secret put GAPI_KEY
#   npx wrangler secret put GSA_JSON
